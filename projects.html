<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Videos | Mohamed Aslam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <script>
        (function() {
            var stored = localStorage.getItem('portfolio-theme');
            var theme = stored;
            if (!theme) {
                var hour = new Date().getHours();
                theme = (hour >= 6 && hour < 19) ? 'light' : 'dark';
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        space: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            900: '#0a0a0f',
                            800: '#12121a',
                            700: '#1a1a24',
                            600: '#22222e',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="text-gray-100 overflow-x-hidden bg-dark-900 page-transition">

    <!-- Custom Cursor -->
    <div class="custom-cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursor-dot"></div>

    <!-- Ambient Particles Canvas -->
    <canvas id="particles-canvas" class="fixed inset-0 pointer-events-none z-0" aria-hidden="true"></canvas>
    
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl float parallax-slow" data-speed="0.02"></div>
        <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-blue-500/10 rounded-full blur-3xl float" style="animation-delay: -3s;" data-speed="0.03"></div>
    </div>

    <nav class="fixed w-full top-0 z-50 glass shadow-2xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4">
            <!-- Desktop: Centered Navigation -->
            <div class="hidden md:flex justify-center items-center">
                <div class="flex items-center space-x-6 lg:space-x-10">
                    <a href="index.html" class="nav-link text-gray-300 hover:text-white transition-colors text-sm lg:text-base font-medium py-2">Back to Profile</a>
                    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle theme">
                        <i class="fas fa-moon icon-moon"></i>
                        <i class="fas fa-sun icon-sun"></i>
                    </button>
                    <a href="index.html#contact" class="magnetic-btn px-5 lg:px-7 py-2.5 lg:py-3 rounded-full bg-gradient-to-r from-purple-600 to-blue-600 text-white text-sm lg:text-base font-semibold hover:shadow-lg hover:shadow-purple-500/25 transition-all">
                        Hire Me
                    </a>
                </div>
            </div>
            
            <!-- Mobile: Full width centered -->
            <div class="flex md:hidden justify-between items-center">
                <div class="flex items-center gap-3">
                    <button type="button" id="theme-toggle-mobile" class="theme-toggle w-12 h-12 flex items-center justify-center" aria-label="Toggle dark/light mode">
                        <i class="fas fa-moon icon-moon text-lg"></i>
                        <i class="fas fa-sun icon-sun text-lg"></i>
                    </button>
                </div>
                <a href="index.html" class="text-white text-lg font-medium flex items-center gap-2 bg-white/5 px-4 py-2 rounded-xl active:bg-white/10 transition-colors">
                    <i class="fas fa-arrow-left text-sm"></i>
                    Back
                </a>
            </div>
        </div>
    </nav>

    <section class="pt-40 pb-20 relative z-10 noise border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 text-center reveal active">
            <div class="inline-flex items-center px-4 py-2 rounded-full glass mb-6">
                <i class="fas fa-video text-purple-400 mr-2 animate-pulse"></i>
                <span class="text-sm text-gray-300">My Video Portfolio</span>
            </div>
            <h1 class="text-4xl md:text-6xl font-bold font-space mb-6">
                Project <span class="gradient-text">Showcase</span>
            </h1>
            <p class="text-gray-400 max-w-2xl mx-auto leading-relaxed">
                Watch detailed demonstrations of my freelance web development builds, software architecture, custom Hackintosh installations, and hardware repairs.
            </p>
        </div>
    </section>

    <section class="py-20 relative z-10">
        <div class="max-w-7xl mx-auto px-6">
            
            <div id="project-grid" class="grid md:grid-cols-2 lg:grid-cols-2 gap-10">
                </div>

        </div>
    </section>

    <footer class="py-8 border-t border-white/10 mt-10 relative z-10">
        <div class="max-w-7xl mx-auto px-6 text-center text-gray-500 text-sm">
            © 2026 <span class="gradient-text font-semibold">Mohamed Aslam Mulaffer</span>. Available for Freelance Projects.
        </div>
    </footer>

    <button id="back-top" class="fixed bottom-8 right-8 w-12 h-12 rounded-xl bg-gradient-to-r from-purple-600 to-blue-600 text-white shadow-lg hidden hover:shadow-purple-500/25 transition-all z-50">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>
        (function() {
            function getTheme() { return document.documentElement.getAttribute('data-theme') || 'dark'; }
            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                try { localStorage.setItem('portfolio-theme', theme); } catch (e) {}
            }
            function toggleTheme() { setTheme(getTheme() === 'dark' ? 'light' : 'dark'); }
            [document.getElementById('theme-toggle'), document.getElementById('theme-toggle-mobile')].forEach(function(btn) {
                if (btn) btn.addEventListener('click', toggleTheme);
            });
        })();
    </script>
    <script>
        // 🚨 HOW TO ADD A NEW PROJECT 🚨
        // Just copy an existing block inside the brackets { }, add a comma, 
        // and paste it below. Change the text and the Cloudinary link!
        
        const myProjects = [
            {
                title: "Custom Web Application Build",
                description: "Showcase of a fully responsive e-commerce web platform I developed from scratch.",
                videoUrl: "https://your-cloudinary-url-here.com/video1.mp4",
                tag: "Web Dev",
                color: "purple" // Options: purple, blue, green, orange, cyan, pink
            },
            {
                title: "Hackintosh: macOS on AMD Processor",
                description: "Demonstrating a perfectly stable macOS installation on an unsupported AMD processor with fully working drivers.",
                videoUrl: "https://res.cloudinary.com/dvrkgxr4p/video/upload/v1771267051/YTDown.com_YouTube_Dual-Boot-Official-macOS-Sequoia-_-Windo_Media_A6grUsOaJso_001_1080p_cumpuo.mp4",
                tag: "Hackintosh",
                color: "blue"
            },
            {
                title: "Python Software Automation Script",
                description: "A Python script in action that automates repetitive daily business tasks, saving hours of manual labor.",
                videoUrl: "https://your-cloudinary-url-here.com/video3.mp4",
                tag: "Python Dev",
                color: "green"
            },
            {
                title: "High-End Laptop Motherboard Repair",
                description: "Complete teardown, hardware diagnostic, and component-level repair of a gaming laptop.",
                videoUrl: "https://your-cloudinary-url-here.com/video4.mp4",
                tag: "Hardware",
                color: "orange"
            }
            // Add your new projects right here! Don't forget the comma on the previous one.
        ];

        // ==========================================
        // DO NOT TOUCH THE CODE BELOW THIS LINE
        // This script automatically builds your webpage based on the data above.
        // ==========================================

        const gridContainer = document.getElementById('project-grid');

        // Color mapping for the tags
        const colorStyles = {
            purple: "bg-purple-500/20 text-purple-300",
            blue: "bg-blue-500/20 text-blue-300",
            green: "bg-green-500/20 text-green-300",
            orange: "bg-orange-500/20 text-orange-300",
            cyan: "bg-cyan-500/20 text-cyan-300",
            pink: "bg-pink-500/20 text-pink-300"
        };

        // Generate HTML for each project
        myProjects.forEach((project, index) => {
            const badgeClass = colorStyles[project.color] || colorStyles.purple; // Default to purple if misspelled
            
            const cardHTML = `
                <div class="premium-card glass rounded-3xl p-6 reveal active" style="animation-delay: ${index * 0.1}s;">
                    <div class="w-full aspect-video rounded-xl overflow-hidden bg-dark-800 mb-6 border border-white/10 relative">
                        <video controls class="w-full h-full object-cover">
                            <source src="${project.videoUrl}" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </div>
                    <div class="flex justify-between items-start gap-4">
                        <div>
                            <h3 class="text-xl font-bold mb-2 text-white">${project.title}</h3>
                            <p class="text-gray-400 text-sm leading-relaxed">${project.description}</p>
                        </div>
                        ${project.tag ? `<span class="px-3 py-1 rounded-full text-xs font-semibold whitespace-nowrap ${badgeClass}">${project.tag}</span>` : ''}
                    </div>
                </div>
            `;
            
            gridContainer.innerHTML += cardHTML;
        });

        // Back to Top functionality
        const backTop = document.getElementById('back-top');
        window.addEventListener('scroll', () => {
            backTop.classList.toggle('hidden', window.scrollY <= 300);
        });
        backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        // Fix for card hover animation - mark cards as animated after initial load
        document.querySelectorAll('.premium-card').forEach(card => {
            card.addEventListener('animationend', function() {
                this.classList.add('animate-done');
            });
            // Fallback: add class after animation duration (600ms)
            setTimeout(() => {
                card.classList.add('animate-done');
            }, 700);
        });

        // ========== PREMIUM ANIMATIONS (Mobile Optimized) ==========
        
        // Check if mobile device
        const isMobile = window.matchMedia('(pointer: coarse)').matches || window.innerWidth < 768;

        // Custom Cursor - Desktop only
        const cursor = document.getElementById('cursor');
        const cursorDot = document.getElementById('cursor-dot');
        
        if (!isMobile && window.matchMedia('(pointer: fine)').matches) {
            let cursorX = 0, cursorY = 0;
            let dotX = 0, dotY = 0;
            
            document.addEventListener('mousemove', (e) => {
                cursorX = e.clientX;
                cursorY = e.clientY;
            });

            function animateCursor() {
                dotX += (cursorX - dotX) * 0.15;
                dotY += (cursorY - dotY) * 0.15;
                
                cursor.style.left = cursorX + 'px';
                cursor.style.top = cursorY + 'px';
                cursorDot.style.left = dotX + 'px';
                cursorDot.style.top = dotY + 'px';
                
                requestAnimationFrame(animateCursor);
            }
            animateCursor();

            const hoverElements = document.querySelectorAll('a, button, .premium-card, video');
            hoverElements.forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
            });

            document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
            document.addEventListener('mouseup', () => cursor.classList.remove('clicking'));
        } else {
            // Hide cursor elements on mobile
            if (cursor) cursor.style.display = 'none';
            if (cursorDot) cursorDot.style.display = 'none';
        }

        // Ambient Particles - Desktop only
        if (!isMobile) {
            const canvas = document.getElementById('particles-canvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                let particles = [];
                let animationId;

                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);

                class Particle {
                    constructor() {
                        this.reset();
                    }
                    reset() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.size = Math.random() * 2 + 0.5;
                        this.speedX = (Math.random() - 0.5) * 0.5;
                        this.speedY = (Math.random() - 0.5) * 0.5;
                        this.opacity = Math.random() * 0.5 + 0.1;
                        this.hue = Math.random() * 60 + 240;
                    }
                    update() {
                        this.x += this.speedX;
                        this.y += this.speedY;
                        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                            this.reset();
                        }
                    }
                    draw() {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${this.hue}, 70%, 60%, ${this.opacity})`;
                        ctx.fill();
                    }
                }

                for (let i = 0; i < 15; i++) {
                    particles.push(new Particle());
                }

                let frameCount = 0;
                function animateParticles() {
                    frameCount++;
                    if (frameCount % 3 === 0) {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        particles.forEach(p => {
                            p.update();
                            p.draw();
                        });
                    }
                    animationId = requestAnimationFrame(animateParticles);
                }
                animateParticles();

                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        cancelAnimationFrame(animationId);
                    } else {
                        animateParticles();
                    }
                });
            }
        } else {
            // Hide canvas on mobile
            const canvas = document.getElementById('particles-canvas');
            if (canvas) canvas.style.display = 'none';
        }

        // Parallax Effect
        function throttle(fn, wait) {
            let last = 0;
            return function(...args) {
                const now = Date.now();
                if (now - last >= wait) {
                    last = now;
                    fn.apply(this, args);
                }
            };
        }

        const parallaxElements = document.querySelectorAll('.parallax-slow, .parallax-medium, .parallax-fast');
        window.addEventListener('scroll', throttle(() => {
            const scrolled = window.scrollY;
            parallaxElements.forEach(el => {
                const speed = parseFloat(el.dataset.speed) || 0.05;
                el.style.transform = `translateY(${scrolled * speed}px)`;
            });
        }, 16));

        // Section Reveal
        const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('section').forEach(section => {
            section.classList.add('section-reveal');
            sectionObserver.observe(section);
        });

        // 3D Card Tilt Effect - Desktop only
        if (!isMobile) {
            document.querySelectorAll('.premium-card').forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (y - centerY) / 20;
                    const rotateY = (centerX - x) / 20;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-8px)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = '';
                });
            });
        }
    </script>
</body>
</html>
